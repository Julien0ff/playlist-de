<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestify - Suggérez vos musiques</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Suggestify</h1>
            <p>Recherchez et proposez des morceaux pour notre playlist collaborative.</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Rechercher un titre, un artiste..." autocomplete="off">
                <div class="loader" id="searchLoader"></div>
            </div>
        </section>

        <section class="results-section" id="resultsContainer">
            <!-- Results will be injected here via JS -->
            <div class="empty-state" id="emptyState">
                <i class="fa-solid fa-music"></i>
                <p>Vos résultats de recherche s'afficheront ici</p>
            </div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span>Musique suggérée avec succès !</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
